<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="bg" x1="18" y1="10" x2="145" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2e1065"/>
      <stop offset="1" stop-color="#9d174d"/>
    </linearGradient>
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(44 36) rotate(42) scale(66)">
      <stop stop-color="white" stop-opacity=".44"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="drop" x="0" y="0" width="160" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="rgba(2,6,23,.34)"/>
    </filter>
    <filter id="soft" x="0" y="0" width="160" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>
  <rect x="6" y="6" width="148" height="148" rx="34" fill="url(#bg)"/>
  <ellipse cx="118" cy="28" rx="26" ry="14" fill="#ffffff" fill-opacity=".28" filter="url(#soft)"/>
  <rect x="6" y="6" width="148" height="148" rx="34" fill="url(#shine)"/>
  <g filter="url(#drop)">

    <g transform="translate(23 26)">
      <circle cx="57" cy="54" r="30" fill="#f472b6"/>
      <circle cx="46" cy="47" r="16" fill="#f9a8d4"/>
      <circle cx="67" cy="65" r="12" fill="#ec4899"/>
      <circle cx="85" cy="38" r="11" fill="#f0abfc"/>
      <circle cx="92" cy="74" r="8" fill="#f5d0fe"/>
    </g>
  </g>
</svg>