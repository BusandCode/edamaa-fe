      <rect x="6" y="92" width="96" height="8" rx="4" fill="#64748b"/>
      <rect x="16" y="10" width="76" height="16" rx="8" fill="#f8fafc"/>
      <line x1="30" y1="18" x2="78" y2="18" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
      <circle cx="32" cy="49" r="5" fill="#93c5fd"/>
      <circle cx="48" cy="49" r="5" fill="#93c5fd"/>
      <circle cx="64" cy="49" r="5" fill="#93c5fd"/>
      <circle cx="80" cy="49" r="5" fill="#93c5fd"/>
    </g>
